# ArizenOS Lite — sysctl optimizations
# Target: SM-T295 — 2GB RAM, Snapdragon 429
# Place in /system/etc/sysctl.d/99-arizen.conf
# Applied at boot by init

# ─── VM Memory Management ─────────────────────────────────────────────────────

# Swappiness: moderate (60) for balanced feel
# Lower = use RAM longer before swapping; higher = swap earlier to free RAM
vm.swappiness = 60

# VFS cache pressure: reclaim dentry/inode cache aggressively
vm.vfs_cache_pressure = 100

# Dirty page writeback — keep writes flowing to prevent stalls
vm.dirty_ratio = 10
vm.dirty_background_ratio = 5
vm.dirty_expire_centisecs = 500
vm.dirty_writeback_centisecs = 100

# Extra free kbytes reserve — prevent OOM surprise on burst allocs
vm.extra_free_kbytes = 24576

# Min free kbytes — kernel memory reserve
vm.min_free_kbytes = 16384

# Disable OOM kill of allocating task — kill cached procs instead
vm.oom_kill_allocating_task = 0

# Page cluster: 0 = read 1 page at a time from swap (faster for random access)
vm.page-cluster = 0

# Compact memory: reduce fragmentation on small-RAM devices
vm.compaction_proactiveness = 20

# ─── Network ─────────────────────────────────────────────────────────────────

# TCP buffer sizes for WiFi throughput
net.core.rmem_max = 1048576
net.core.wmem_max = 1048576
net.ipv4.tcp_rmem = 4096 87380 1048576
net.ipv4.tcp_wmem = 4096 65536 1048576

# TCP optimizations
net.ipv4.tcp_fastopen = 3
net.ipv4.tcp_tw_reuse = 1
net.ipv4.tcp_fin_timeout = 15

# ─── Kernel ──────────────────────────────────────────────────────────────────

# Kernel panic: auto-reboot after 5 seconds
kernel.panic = 5
kernel.panic_on_oops = 0

# Reduce scheduler latency: better responsiveness on 4-core device
kernel.sched_latency_ns = 10000000
kernel.sched_min_granularity_ns = 1500000
kernel.sched_wakeup_granularity_ns = 2000000

# Disable printk to reduce I/O noise
kernel.printk = 3 3 3 3
