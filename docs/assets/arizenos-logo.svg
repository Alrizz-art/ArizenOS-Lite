<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7B2FFF;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background pill -->
  <rect x="0" y="0" width="400" height="120" rx="16" ry="16" fill="#0D0D0F"/>
  <!-- Icon circle -->
  <circle cx="60" cy="60" r="40" fill="url(#grad)" opacity="0.15"/>
  <circle cx="60" cy="60" r="32" fill="none" stroke="url(#grad)" stroke-width="2"/>
  <!-- A letter -->
  <text x="60" y="68" font-family="system-ui,-apple-system,sans-serif" font-size="32"
        font-weight="700" fill="url(#grad)" text-anchor="middle">A</text>
  <!-- ArizenOS text -->
  <text x="115" y="52" font-family="system-ui,-apple-system,sans-serif"
        font-size="28" font-weight="700" fill="#FFFFFF" letter-spacing="0.5">ArizenOS</text>
  <!-- Lite badge -->
  <rect x="115" y="63" width="44" height="20" rx="4" fill="url(#grad)" opacity="0.9"/>
  <text x="137" y="77" font-family="system-ui,-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle"
        letter-spacing="1">LITE</text>
  <!-- Tagline -->
  <text x="168" y="77" font-family="system-ui,-apple-system,sans-serif"
        font-size="12" fill="#888888" letter-spacing="0.3">for SM-T295</text>
</svg>
