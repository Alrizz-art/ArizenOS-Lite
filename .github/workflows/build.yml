name: 🚀 Build ArizenOS Lite

on:
  workflow_dispatch:
    inputs:
      device_region:
        description: 'Region firmware SM-T295 (XSP=Global, INS=India, EUX=Europe)'
        required: true
        default: 'XSP'
        type: choice
        options: [XSP, INS, EUX, DBT, BTU, SER, THL, OXM]
      arizen_version:
        description: 'Versi ArizenOS (contoh: 1.0)'
        required: true
        default: '1.0'
      create_release:
        description: 'Buat GitHub Release setelah build?'
        required: true
        default: 'true'
        type: boolean

env:
  DEVICE_MODEL: SM-T295
  ARIZEN_VERSION: ${{ inputs.arizen_version }}

jobs:
  build:
    name: ArizenOS Lite v${{ inputs.arizen_version }} — ${{ inputs.device_region }}
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔧 Install build tools
        run: |
          sudo apt-get update -qq
          # Core tools
          sudo apt-get install -y -qq \
            tar openssl unzip file lz4 \
            e2fsprogs pv wget curl

          # Try to get simg2img / img2simg
          sudo apt-get install -y -qq android-tools-fsutils 2>/dev/null || true

          # If not available, build from source
          if ! command -v simg2img &>/dev/null; then
            echo "Building simg2img from source..."
            sudo apt-get install -y -qq build-essential libz-dev git
            git clone --depth=1 https://github.com/anestisb/android-simg2img /tmp/simg2img
            cd /tmp/simg2img && make && sudo cp simg2img img2simg /usr/local/bin/
          fi

          simg2img --version 2>/dev/null || echo "simg2img ready"
          echo "✅ Build tools ready"

      - name: 📡 Download firmware via samloader
        run: |
          pip install samloader --quiet
          mkdir -p firmware

          echo "📡 Fetching latest firmware info for $DEVICE_MODEL / ${{ inputs.device_region }}..."

          # Get latest version info first
          samloader \
            -m $DEVICE_MODEL \
            -r ${{ inputs.device_region }} \
            checkupdate 2>/dev/null || true

          # Download firmware
          samloader \
            -m $DEVICE_MODEL \
            -r ${{ inputs.device_region }} \
            download \
            -O firmware \
            --auto-download 2>/dev/null \
          || samloader \
            -m $DEVICE_MODEL \
            -r ${{ inputs.device_region }} \
            download \
            -O firmware

          ls -lh firmware/
          FW_ZIP=$(find firmware/ -name "*.zip" | head -1)
          [[ -z "$FW_ZIP" ]] && { echo "❌ Download failed"; exit 1; }
          echo "✅ Firmware: $(basename $FW_ZIP)"
          echo "FW_ZIP=$FW_ZIP" >> $GITHUB_ENV

      - name: 📂 Extract firmware
        run: |
          chmod +x scripts/*.sh
          ./scripts/extract_firmware.sh "$FW_ZIP"
          ls -lh work/

      - name: 🔓 Unpack AP (system partition)
        run: |
          # GitHub Actions has full sudo — loop mount works
          sudo ./scripts/unpack_ap.sh

      - name: 💉 Inject ArizenOS
        run: |
          sudo ./scripts/inject_arizenos.sh

      - name: 📦 Repack AP
        run: |
          sudo ./scripts/repack_ap.sh

      - name: 🎁 Package Odin flashable
        run: |
          ./scripts/package_odin.sh
          OUTPUT=$(find output/ -name "*.tar.md5" | head -1)
          [[ -z "$OUTPUT" ]] && { echo "❌ Package failed"; exit 1; }
          echo "OUTPUT_FILE=$OUTPUT" >> $GITHUB_ENV
          echo "OUTPUT_NAME=$(basename $OUTPUT)" >> $GITHUB_ENV
          echo "FILE_SIZE=$(du -sh $OUTPUT | cut -f1)" >> $GITHUB_ENV

      - name: 📤 Upload Artifact (always available)
        uses: actions/upload-artifact@v4
        with:
          name: ArizenOS-Lite-v${{ inputs.arizen_version }}-SM-T295-${{ inputs.device_region }}
          path: output/*.tar.md5
          retention-days: 14
          if-no-files-found: error

      - name: 🏷️ Create GitHub Release
        if: ${{ inputs.create_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.arizen_version }}-${{ inputs.device_region }}-build${{ github.run_number }}
          name: "ArizenOS Lite v${{ inputs.arizen_version }} — SM-T295 (${{ inputs.device_region }})"
          body: |
            ## ArizenOS Lite v${{ inputs.arizen_version }}

            > Transform stock Samsung firmware into a premium AI-native experience

            | | |
            |--|--|
            | **Device** | Samsung Galaxy Tab A 8.0 2019 (SM-T295) |
            | **Region** | ${{ inputs.device_region }} |
            | **Base** | Samsung Stock Firmware (official) |
            | **Size** | ${{ env.FILE_SIZE }} |
            | **Build** | #${{ github.run_number }} |

            ### ✨ What's included
            - **Arizen Launcher** — AI-centered dashboard homescreen
            - **Arizen Core** — Cloud AI assistant (Groq/Together/OpenAI)
            - **Samsung Debloat** — ~25 bloatware packages removed
            - **ZRAM Tuning** — 512MB compressed swap for 2GB RAM
            - **build.prop Tweaks** — Heap & performance optimization
            - **AMOLED Dark Theme** — System-wide

            ### ⚡ Flash via Odin
            1. Download `${{ env.OUTPUT_NAME }}` below
            2. Boot SM-T295 → **Download Mode** (`Power + Vol↓ + Bixby` → `Vol↑`)
            3. Odin → **AP** → select file → **Start**
            4. Wait for **PASS!** — device reboots into ArizenOS Lite ✅

            ### ⚠️ Important
            - Backup all data before flashing
            - Re-Partition must be **OFF** in Odin
            - Keep stock firmware for recovery
            - See [PANDUAN_LENGKAP.md](PANDUAN_LENGKAP.md) for full guide

            ---
            *Built with GitHub Actions — ArizenOS Project by @Alrizz-art*
          files: output/*.tar.md5
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Summary
        run: |
          {
            echo "## 🎉 ArizenOS Lite Build Complete!"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| File | \`$OUTPUT_NAME\` |"
            echo "| Size | $FILE_SIZE |"
            echo "| Region | ${{ inputs.device_region }} |"
            echo "| Build | #${{ github.run_number }} |"
            echo ""
            echo "**Download dari tab [Releases](../../releases) atau [Artifacts](#artifacts) di atas!** ⬆️"
          } >> $GITHUB_STEP_SUMMARY
