name: Build ArizenOS Lite

on:
  workflow_dispatch:
    inputs:
      device_region:
        description: 'Region firmware SM-T295 (XSP=Global, INS=India, EUX=Europe)'
        required: true
        default: 'XSP'
        type: choice
        options: [XSP, INS, EUX, DBT, BTU, SER, THL, OXM]
      arizen_version:
        description: 'Versi ArizenOS (contoh: 1.0)'
        required: true
        default: '1.0'
      create_release:
        description: 'Buat GitHub Release setelah build?'
        required: true
        default: 'true'
        type: boolean

env:
  DEVICE_MODEL: SM-T295
  ARIZEN_VERSION: ${{ inputs.arizen_version }}

jobs:
  build:
    name: ArizenOS Lite v${{ inputs.arizen_version }} — ${{ inputs.device_region }}
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java (for Android Gradle build)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Python (for samloader)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            tar openssl unzip file lz4 \
            e2fsprogs pv wget curl

          # simg2img / img2simg
          sudo apt-get install -y -qq android-tools-fsutils 2>/dev/null || true
          if ! command -v simg2img &>/dev/null || ! command -v img2simg &>/dev/null; then
            sudo apt-get install -y -qq build-essential libz-dev git
            git clone --depth=1 https://github.com/anestisb/android-simg2img /tmp/simg2img-src
            cd /tmp/simg2img-src && make
            sudo cp simg2img img2simg /usr/local/bin/
            cd -
          fi
          echo "simg2img: $(command -v simg2img)"
          echo "img2simg: $(command -v img2simg)"

      # ── BUILD ARIZEN LAUNCHER APK ──────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build ArizenLauncher.apk
        run: |
          echo "Building ArizenLauncher from source..."
          cd arizen-launcher

          # Make Gradle wrapper executable
          chmod +x gradlew 2>/dev/null || true

          # Use system gradle if no wrapper
          if [[ ! -f gradlew ]]; then
            gradle wrapper --gradle-version 7.6
          fi

          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace \
            -Pandroid.suppressUnsupportedCompileSdk=28 \
            2>&1 | tail -50

          # Find the output APK
          APK=$(find . -name "*.apk" -path "*/release/*" 2>/dev/null | head -1)
          [[ -z "$APK" ]] && APK=$(find . -name "*.apk" 2>/dev/null | head -1)
          [[ -z "$APK" ]] && { echo "APK not found after build!"; exit 1; }

          # Copy to repo root as ArizenLauncher.apk
          cp "$APK" "../ArizenLauncher.apk"
          echo "APK built: $(basename $APK) ($(du -sh $APK | cut -f1))"
          cd ..

      # ── DOWNLOAD FIRMWARE ────────────────────────────────────────────────
      - name: Download firmware via samloader
        run: |
          pip install samloader --quiet
          mkdir -p firmware

          samloader -m $DEVICE_MODEL -r ${{ inputs.device_region }} download -O firmware --auto-download 2>/dev/null \
          || samloader --model $DEVICE_MODEL --region ${{ inputs.device_region }} download --output firmware 2>/dev/null \
          || { echo "samloader failed for region ${{ inputs.device_region }}"; exit 1; }

          FW_ZIP=$(find firmware/ -name "*.zip" | head -1)
          [[ -z "$FW_ZIP" ]] && { echo "Firmware zip not found"; exit 1; }
          echo "FW_ZIP=$FW_ZIP" >> $GITHUB_ENV
          echo "Downloaded: $(basename $FW_ZIP) ($(du -sh $FW_ZIP | cut -f1))"

      # ── BUILD FIRMWARE ───────────────────────────────────────────────────
      - name: Extract firmware
        run: |
          chmod +x scripts/*.sh
          bash scripts/extract_firmware.sh "$FW_ZIP"
          ls -lh work/

      - name: Unpack AP partition
        run: sudo bash scripts/unpack_ap.sh

      - name: Inject ArizenOS
        run: sudo bash scripts/inject_arizenos.sh

      - name: Repack AP
        run: sudo bash scripts/repack_ap.sh

      - name: Package Odin flashable
        run: |
          export ARIZEN_VERSION="${{ inputs.arizen_version }}"
          bash scripts/package_odin.sh
          OUTPUT=$(find output/ -name "*.tar.md5" | head -1)
          [[ -z "$OUTPUT" ]] && { echo "Package not found"; exit 1; }
          echo "OUTPUT_FILE=$OUTPUT" >> $GITHUB_ENV
          echo "OUTPUT_NAME=$(basename $OUTPUT)" >> $GITHUB_ENV
          echo "FILE_SIZE=$(du -sh $OUTPUT | cut -f1)" >> $GITHUB_ENV

      # ── RELEASE ──────────────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArizenOS-Lite-v${{ inputs.arizen_version }}-SM-T295-${{ inputs.device_region }}
          path: output/*.tar.md5
          retention-days: 14
          if-no-files-found: error

      - name: Create GitHub Release
        if: ${{ inputs.create_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.arizen_version }}-${{ inputs.device_region }}-build${{ github.run_number }}
          name: "ArizenOS Lite v${{ inputs.arizen_version }} — SM-T295 (${{ inputs.device_region }})"
          body: |
            ## ArizenOS Lite v${{ inputs.arizen_version }}

            > Stock Samsung firmware — modified, debloated, Arizen Launcher as default home

            | | |
            |--|--|
            | **Device** | Samsung Galaxy Tab A 8.0 2019 (SM-T295) |
            | **Region** | ${{ inputs.device_region }} |
            | **Base** | Samsung Stock Firmware (official) |
            | **Size** | ${{ env.FILE_SIZE }} |
            | **Build** | #${{ github.run_number }} |

            ### Whats changed
            - **Arizen Launcher** — installed in priv-app, set as **default HOME launcher**
            - Samsung launcher replaced by Arizen Launcher
            - Samsung bloatware removed (~25 packages)
            - ZRAM 512MB enabled (`/system/etc/init/arizen_zram.rc`)
            - build.prop performance tweaks (heap, LMK, rendering)
            - ArizenOS branding throughout system

            ### Flash via Odin (Windows)
            1. Download `${{ env.OUTPUT_NAME }}` below
            2. Boot SM-T295: hold `Power + Vol Down + Bixby` → press `Vol Up`
            3. Open Odin → **AP** → select the `.tar.md5` file
            4. Options: **Auto Reboot ON** | **F.Reset Time ON** | **Re-Partition OFF**
            5. Click **Start** — wait for green **PASS!**

            ### Flash via Heimdall (macOS/Linux)
            ```bash
            heimdall flash --SYSTEM output/${{ env.OUTPUT_NAME }}
            ```

            ### Recovery (bootloop)
            Flash original SM-T295 firmware from [samfw.com](https://samfw.com)

            ---
            *ArizenOS by @Alrizz-art — Built by GitHub Actions*
          files: output/*.tar.md5
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build summary
        if: always()
        run: |
          {
            echo "## ArizenOS Lite Build"
            if [[ -n "${OUTPUT_NAME:-}" ]]; then
              echo "**SUCCESS**"
              echo "| Field | Value |"
              echo "|-------|-------|"
              echo "| File | \`$OUTPUT_NAME\` |"
              echo "| Size | $FILE_SIZE |"
              echo "| Region | ${{ inputs.device_region }} |"
              echo "| Build | #${{ github.run_number }} |"
              echo ""
              echo "Download from **Releases** tab above."
            else
              echo "**FAILED** — check logs above"
            fi
          } >> $GITHUB_STEP_SUMMARY
