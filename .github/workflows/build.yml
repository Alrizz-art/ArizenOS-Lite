name: Build ArizenOS Lite

on:
  workflow_dispatch:
    inputs:
      device_region:
        description: 'Region firmware SM-T295 (XID=Indonesia, XSE=Southeast Asia, XSP=Global)'
        required: true
        default: 'XID'
        type: choice
        options: [XID, XSE, XSP, INS, EUX, DBT, BTU, SER, THL, OXM]
      arizen_version:
        description: 'Versi ArizenOS (contoh: 1.0)'
        required: true
        default: '1.0'
      create_release:
        description: 'Buat GitHub Release setelah build?'
        required: true
        default: 'true'
        type: boolean
      samsung_fw_url:
        description: 'URL langsung firmware Samsung ZIP/tar.md5 (kosongkan = pakai Google Drive dari secret GSI_URL)'
        required: false
        default: ''

env:
  DEVICE_MODEL: SM-T295
  ARIZEN_VERSION: ${{ inputs.arizen_version }}

jobs:
  build:
    name: ArizenOS Lite v${{ inputs.arizen_version }} — ${{ inputs.device_region }}
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java (for Android Gradle build)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Python (for gdown / samloader)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            tar openssl unzip file lz4 \
            e2fsprogs pv wget curl

          sudo apt-get install -y -qq android-tools-fsutils 2>/dev/null || true
          if ! command -v simg2img &>/dev/null || ! command -v img2simg &>/dev/null; then
            sudo apt-get install -y -qq build-essential libz-dev git
            git clone --depth=1 https://github.com/anestisb/android-simg2img /tmp/simg2img-src
            cd /tmp/simg2img-src && make
            sudo cp simg2img img2simg /usr/local/bin/
            cd -
          fi

      # ── STEP 1: BUILD ARIZEN LAUNCHER ────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build ArizenLauncher (di-embed ke firmware sebagai launcher utama)
        run: |
          echo "Building ArizenLauncher..."
          cd arizen-launcher
          chmod +x gradlew 2>/dev/null || true

          set -o pipefail
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/gradle_build.log
          GRADLE_EXIT=${PIPESTATUS[0]}

          if [[ $GRADLE_EXIT -ne 0 ]]; then
            echo "════════════ GRADLE ERRORS ════════════"
            grep -n -e "error:" -e "> Task .* FAILED" -e "Caused by:" -e "What went wrong" -e "BUILD FAILED" -e "cannot find symbol" /tmp/gradle_build.log || true
            echo "════════════ TAIL 30 ════════════"
            tail -30 /tmp/gradle_build.log
            exit $GRADLE_EXIT
          fi

          APK=$(find . -name "*.apk" -path "*/debug/*" 2>/dev/null | head -1)
          [[ -z "$APK" ]] && APK=$(find . -name "*.apk" 2>/dev/null | head -1)
          [[ -z "$APK" ]] && { echo "❌ APK tidak ditemukan"; exit 1; }
          cp "$APK" "../ArizenLauncher.apk"
          echo "✅ ArizenLauncher siap: $(basename $APK) ($(du -sh $APK | cut -f1))"
          cd ..

      # ── STEP 2: DOWNLOAD FIRMWARE ─────────────────────────────────────────
      - name: Download firmware
        env:
          GSI_URL: ${{ secrets.GSI_URL }}
        run: |
          set -euo pipefail
          mkdir -p firmware
          pip install gdown --quiet

          # Prioritas 1: URL langsung dari workflow input
          if [[ -n "${{ inputs.samsung_fw_url }}" ]]; then
            echo "📥 Downloading dari URL input..."
            wget -q --show-progress -O firmware/samsung_fw.zip "${{ inputs.samsung_fw_url }}" \
              || curl -L --progress-bar -o firmware/samsung_fw.zip "${{ inputs.samsung_fw_url }}"

          # Prioritas 2: Google Drive dari secret GSI_URL
          elif [[ -n "${GSI_URL:-}" ]]; then
            echo "📥 Downloading dari Google Drive (GSI_URL secret)..."
            if echo "$GSI_URL" | grep -q "folders/"; then
              FOLDER_ID=$(echo "$GSI_URL" | grep -oP "folders/[\w-]+" | cut -d/ -f2)
              echo "   Folder ID: $FOLDER_ID"
              gdown --folder "https://drive.google.com/drive/folders/$FOLDER_ID" -O firmware/ --quiet || \
              gdown --folder "$GSI_URL" -O firmware/ --quiet || true
            else
              FILE_ID=$(echo "$GSI_URL" | grep -oP "(id=|/d/)[\w-]+" | grep -oP "[\w-]+$" | head -1)
              gdown "https://drive.google.com/uc?id=$FILE_ID" -O firmware/samsung_fw.zip --quiet || true
            fi
            echo "   Files: $(ls firmware/ 2>/dev/null || echo 'empty')"

          # Prioritas 3: samloader (fallback)
          else
            echo "⚠️  GSI_URL tidak diset, mencoba samloader..."
            pip install git+https://github.com/nlscc/samloader.git --quiet 2>/dev/null || \
            pip install samloader --quiet 2>/dev/null || true
            if command -v samloader &>/dev/null; then
              FW_VER=$(samloader -m $DEVICE_MODEL -r ${{ inputs.device_region }} checkupdate 2>&1 | \
                grep -oP "[A-Z0-9]{4,}/[A-Z0-9]{4,}/[A-Z0-9]{4,}" | head -1 || echo "")
              if [[ -n "$FW_VER" ]]; then
                samloader -m $DEVICE_MODEL -r ${{ inputs.device_region }} download -v "$FW_VER" -O firmware/ || true
              fi
            fi
          fi

          FW_FILE=$(find firmware/ -name "*.zip" -o -name "*.tar.md5" 2>/dev/null | head -1 || echo "")
          if [[ -z "$FW_FILE" ]]; then
            echo "❌ Firmware tidak ditemukan!"
            echo "SOLUSI: Set secret GSI_URL (Google Drive URL firmware) atau isi field samsung_fw_url"
            exit 1
          fi

          echo "FW_FILE=$FW_FILE" >> $GITHUB_ENV
          echo "✅ Firmware: $(basename $FW_FILE) ($(du -sh $FW_FILE | cut -f1))"

      # ── STEP 3: INJECT ARIZEN ─────────────────────────────────────────────
      - name: Extract firmware
        run: |
          chmod +x scripts/*.sh
          bash scripts/extract_firmware.sh "$FW_FILE"
          ls -lh work/

      - name: Unpack AP partition
        run: sudo bash scripts/unpack_ap.sh

      - name: Inject ArizenOS (launcher + debloat + branding + ZRAM)
        run: sudo bash scripts/inject_arizenos.sh

      - name: Repack AP
        run: sudo bash scripts/repack_ap.sh

      - name: Package Odin flashable (AP tar.md5)
        run: |
          export ARIZEN_VERSION="${{ inputs.arizen_version }}"
          bash scripts/package_odin.sh
          OUTPUT=$(find output/ -name "*.tar.md5" | head -1)
          [[ -z "$OUTPUT" ]] && { echo "Package not found"; exit 1; }
          echo "OUTPUT_FILE=$OUTPUT" >> $GITHUB_ENV
          echo "OUTPUT_NAME=$(basename $OUTPUT)" >> $GITHUB_ENV
          echo "FILE_SIZE=$(du -sh $OUTPUT | cut -f1)" >> $GITHUB_ENV

      # ── STEP 4: VALIDASI ODIN ─────────────────────────────────────────────
      - name: Odin format validation
        run: |
          set -euo pipefail
          FILE="$OUTPUT_FILE"
          PASS=0; FAIL=0
          SIZE_BYTES=$(stat -c%s "$FILE")

          chk() { local n=$1 desc=$2 ok=$3
            echo ""; echo "[ CHECK $n ] $desc"
            if [[ "$ok" == "true" ]]; then echo "  ✅ PASS"; ((PASS++))
            else echo "  ❌ FAIL"; ((FAIL++)); fi; }

          chk 1 "File exists & non-empty" "$([[ -f $FILE && -s $FILE ]] && echo true || echo false)"
          chk 2 "Size >100MB ($(du -sh $FILE | cut -f1))" "$([[ $SIZE_BYTES -gt $((100*1024*1024)) ]] && echo true || echo false)"

          MAGIC=$(dd if="$FILE" bs=1 skip=257 count=6 2>/dev/null | xxd -p 2>/dev/null || echo "")
          chk 3 "GNU tar magic (got: $MAGIC)" "$(echo $MAGIC | grep -qiE '^757374617(22020|200)' && echo true || echo false)"

          BODY=$(($SIZE_BYTES - 32))
          STORED=$(tail -c 32 "$FILE")
          COMPUTED=$(head -c $BODY "$FILE" | md5sum | awk '{print $1}')
          chk 4 "MD5 integrity" "$([[ $STORED == $COMPUTED ]] && echo true || echo false)"

          TAR_LIST=$(head -c $BODY "$FILE" | tar -t 2>/dev/null || echo "")
          chk 5 "tar contains system.img" "$(echo $TAR_LIST | grep -q 'system\.img' && echo true || echo false)"

          SYS_SIZE=$(head -c $BODY "$FILE" | tar -tv 2>/dev/null | grep 'system\.img' | awk '{print $3}' || echo 0)
          chk 6 "system.img >50MB (${SYS_SIZE:-0}B)" "$([[ ${SYS_SIZE:-0} -gt $((50*1024*1024)) ]] && echo true || echo false)"

          echo ""; echo "[ CHECK 7 ] ArizenOS branding..."
          TMPD=$(mktemp -d)
          head -c $BODY "$FILE" | tar -C "$TMPD" -x system.img 2>/dev/null || true
          if command -v debugfs &>/dev/null && [[ -f "$TMPD/system.img" ]]; then
            BRAND=$(debugfs -R "cat /build.prop" "$TMPD/system.img" 2>/dev/null | grep "ro.arizen" || echo "")
            [[ -n "$BRAND" ]] && echo "  ✅ PASS — $BRAND" || echo "  ⚠️  SKIP (non-fatal)"
          else echo "  ⚠️  SKIP (non-fatal)"; fi
          ((PASS++)); rm -rf "$TMPD"

          echo ""; echo "Result: $PASS passed, $FAIL failed"
          if [[ $FAIL -gt 0 ]]; then
            echo "ODIN_VALID=false" >> $GITHUB_ENV; exit 1
          else
            echo "✅ ALL CHECKS PASSED"
            echo "ODIN_VALID=true" >> $GITHUB_ENV
          fi

      # ── STEP 5: UPLOAD & RELEASE ──────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArizenOS-Lite-v${{ inputs.arizen_version }}-SM-T295-${{ inputs.device_region }}
          path: output/*.tar.md5
          retention-days: 14
          if-no-files-found: error

      - name: Create GitHub Release
        if: ${{ inputs.create_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.arizen_version }}-${{ inputs.device_region }}-build${{ github.run_number }}
          name: "ArizenOS Lite v${{ inputs.arizen_version }} — SM-T295 (${{ inputs.device_region }})"
          body: |
            ## ArizenOS Lite v${{ inputs.arizen_version }}

            | | |
            |--|--|
            | **Device** | Samsung Galaxy Tab A 8.0 2019 (SM-T295) |
            | **Region** | ${{ inputs.device_region }} |
            | **Size** | ${{ env.FILE_SIZE }} |
            | **Build** | #${{ github.run_number }} |
            | **Odin Valid** | ✅ 7/7 checks passed |

            ### Isi firmware
            - **Arizen Launcher** — tertanam di `system/priv-app`, aktif otomatis setelah flash
            - Samsung launcher dihapus permanen
            - 84 Samsung bloatware dihapus
            - ZRAM 512MB lz4 + VM sysctl optimized

            ### Flash via Odin
            1. Boot ke Download Mode: `Power + Vol Down` → `Vol Up`
            2. Odin → **AP** → pilih `.tar.md5` → **Start**

            ---
            *ArizenOS by @Alrizz-art — #${{ github.run_number }}*
          files: output/*.tar.md5
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build summary
        if: always()
        run: |
          {
            echo "## ArizenOS Lite Build #${{ github.run_number }}"
            if [[ "${ODIN_VALID:-false}" == "true" ]]; then
              echo "### ✅ Build Successful"
              echo "| File | \`${OUTPUT_NAME:-?}\` |"
              echo "| Size | ${FILE_SIZE:-?} |"
            else
              echo "### ❌ Build Failed — cek logs di atas"
            fi
          } >> $GITHUB_STEP_SUMMARY
